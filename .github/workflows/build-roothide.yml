name: Build CC26 for roothide

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-roothide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash curl sudo git make clang lld dpkg \
            build-essential fakeroot perl python3 rsync \
            unzip xz-utils zstd file libtinfo6

      - name: Install ldid manually
        run: |
          curl -L -o ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_x86_64
          chmod +x ldid
          sudo mv ldid /usr/local/bin/ldid
          ldid -h || true

      - name: Install roothide Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/roothide/theos/master/bin/install-theos)"

      - name: Setup Theos env
        run: |
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Install required iPhoneOS SDKs
        run: |
          mkdir -p "$HOME/theos/sdks"

          curl -L -o iPhoneOS14.5.sdk.tar.xz https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C "$HOME/theos/sdks"

          curl -L -o iPhoneOS15.6.sdk.tar.xz https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS15.6.sdk.tar.xz
          tar -xf iPhoneOS15.6.sdk.tar.xz -C "$HOME/theos/sdks"

          if [ ! -d "$HOME/theos/sdks/iPhoneOS15.0.sdk" ]; then
            ln -s "$HOME/theos/sdks/iPhoneOS15.6.sdk" "$HOME/theos/sdks/iPhoneOS15.0.sdk"
          fi

          ls -la "$HOME/theos/sdks"

      - name: Check Makefiles
        run: |
          echo "===== Root Makefile ====="
          cat Makefile || true

          echo "===== CC26Preferences Makefile ====="
          cat CC26Preferences/Makefile || true

          echo "===== SDK references ====="
          grep -R "iPhoneOS\|SDKVERSION\|TARGET" -n Makefile CC26Preferences || true

      - name: Build roothide package
        run: |
          make clean || true
          make package THEOS_PACKAGE_SCHEME=roothide ARCHS="arm64 arm64e"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: CC26-roothide-deb
          path: packages/*.deb
